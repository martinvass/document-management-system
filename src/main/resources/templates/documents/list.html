<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="hu">
<head th:replace="~{fragments/header :: html_header(title='DMS - Documents', additionalLinks=~{this::page_links})}">
    <th:block th:fragment="page_links">
        <link rel="stylesheet" th:href="@{/css/dashboard.css}">
        <link rel="stylesheet" th:href="@{/css/home.css}">
        <link rel="stylesheet" th:href="@{/css/components.css}">
        <link rel="stylesheet" th:href="@{/css/pages/documents.css}">
    </th:block>
</head>
<body>
<nav th:replace="~{fragments/dashboard/navigation :: navigation_bar}"></nav>
<div th:replace="~{fragments/dashboard/sidebar :: sidebar(content=~{::content})}">
    <div th:fragment="content" class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold mb-0">Documents</h3>
                <small class="text-muted">Manage your documents</small>
            </div>
            <a class="btn btn-primary shadow-sm" href="#upload">
                <i class="fa-solid fa-upload me-1"></i> Upload Document
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card shadow-sm">
                    <div class="card-body text-center">
                        <div class="mb-2 text-olive fs-1">
                            <i class="fas fa-file-alt"></i>
                        </div>
                        <h6 class="text-muted mb-1">Total Documents</h6>
                        <h2 class="fw-bold text-olive mb-0" th:text="${totalDocuments}">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card shadow-sm">
                    <div class="card-body text-center">
                        <div class="mb-2 text-olive fs-1">
                            <i class="fas fa-upload"></i>
                        </div>
                        <h6 class="text-muted mb-1">My Uploads</h6>
                        <h2 class="fw-bold text-olive mb-0" th:text="${myUploadsCount ?: 0}">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="mb-3">
            <form method="get" action="/documents">
                <div class="row align-items-center">
                    <div class="col-lg-8 col-12">
                        <div class="d-flex flex-wrap align-items-center gap-2">
                            <div class="d-flex gap-2">
                                <select name="departmentId"
                                        class="form-select form-select-sm form-select-custom-md">
                                    <option value="">All Departments</option>
                                    <option th:each="dept : ${allDepartments}"
                                            th:value="${dept.id}"
                                            th:text="${dept.name}"
                                            th:selected="${param.departmentId != null and param.departmentId[0] == dept.id.toString()}">
                                    </option>
                                </select>

                                <select name="fileType"
                                        class="form-select form-select-sm form-select-custom-sm">
                                    <option value="">All Types</option>
                                    <option value="pdf" th:selected="${param.fileType != null and param.fileType[0] == 'pdf'}">PDF</option>
                                    <option value="docx" th:selected="${param.fileType != null and param.fileType[0] == 'docx'}">Word</option>
                                    <option value="xlsx" th:selected="${param.fileType != null and param.fileType[0] == 'xlsx'}">Excel</option>
                                    <option value="image" th:selected="${param.fileType != null and param.fileType[0] == 'image'}">Image</option>
                                </select>
                            </div>

                            <div class="form-check ms-2">
                                <input class="form-check-input checkbox-custom"
                                       type="checkbox"
                                       name="myUploads"
                                       id="myUploadsCheck"
                                       th:checked="${param.myUploads != null}">
                                <label class="form-check-label filter-label"
                                       for="myUploadsCheck">
                                    My Uploads
                                </label>
                            </div>

                            <div class="d-flex gap-2 ms-3">
                                <button type="submit" class="btn btn-sm btn-primary">
                                    <i class="fas fa-filter me-1"></i> Filter
                                </button>

                                <a href="/documents" class="btn btn-sm btn-outline-secondary">
                                    Clear
                                </a>
                            </div>

                        </div>
                    </div>

                    <div class="col-lg-4 col-12 mt-2 mt-lg-0">
                        <div class="search-wrapper ms-lg-auto">
                            <i class="fas fa-search"></i>
                            <input type="text"
                                   placeholder="Search documents..."
                                   id="searchInput"
                                   onkeyup="filterDocuments()"/>
                        </div>
                    </div>

                </div>
            </form>
        </div>

        <div th:if="${#lists.isEmpty(documents)}" class="card border-0 shadow-sm">
            <div class="card-body text-center py-5">
                <i class="fas fa-folder-open text-muted display-1 opacity-25"></i>
                <p class="text-muted mt-3 mb-0">No documents found</p>
            </div>
        </div>

        <div class="doc-grid" id="docGrid" th:unless="${#lists.isEmpty(documents)}">
            <div th:each="doc : ${documents}"
                 class="doc-card"
                 th:attr="data-id=${doc.id}, data-name=${doc.originalFilename}"
                 onclick="viewDocument(this)">

                <div class="doc-icon">
                    <i th:class="${doc.getIconClass()}"></i>
                </div>

                <div class="doc-header">
                    <div class="doc-name" th:text="${doc.originalFilename}">document.pdf</div>
                    <span class="doc-version-badge" th:text="'v' + ${doc.version}">v1</span>
                    <span class="doc-storage-badge"
                          th:classappend="${doc.storageType.name() == 'CUSTOM_S3' ? 'storage-s3' : 'storage-managed'}"
                          th:title="${doc.storageType.name() == 'CUSTOM_S3' ? 'Stored in S3' : 'Managed storage'}">
                        <i th:class="${doc.storageType.name() == 'CUSTOM_S3' ? 'fa-brands fa-aws' : 'fa-solid fa-database'}"></i>
                        <span th:text="${doc.storageType.name() == 'CUSTOM_S3' ? 'S3' : 'Managed'}">S3</span>
                    </span>
                </div>

                <div class="doc-description" th:text="${doc.description ?: 'No description'}">
                    Document description here...
                </div>

                <div class="doc-meta">
                    <div class="doc-meta-item">
                        <i class="fas fa-user"></i>
                        <span th:text="${doc.uploadedBy.username}">User</span>
                    </div>
                    <div class="doc-meta-item">
                        <i class="fas fa-calendar"></i>
                        <span th:text="${#temporals.format(doc.uploadedAt, 'MMM dd')}">Jan 15</span>
                    </div>
                    <div class="doc-meta-item">
                        <i class="fas fa-weight"></i>
                        <span th:text="${#numbers.formatDecimal(doc.size / 1024.0, 1, 2)} + ' KB'">125.50 KB</span>
                    </div>
                </div>

                <div class="doc-actions" onclick="event.stopPropagation()">
                    <a th:href="@{/documents/{id}/download(id=${doc.id})}"
                       class="btn btn-sm btn-outline-secondary"
                       title="Download">
                        <i class="fa-solid fa-download"></i>
                    </a>
                </div>
            </div>
        </div>

        <div class="floating-pagination-modern">
            <ul class="pagination-modern">
                <li th:classappend="${documents.first} ? 'disabled'">
                    <a th:if="${!documents.first}"
                       th:href="@{/documents(page=${currentPage - 1}, search=${param.search}, fileType=${param.fileType}, storage=${param.storage})}">
                        prev
                    </a>
                    <span th:if="${documents.first}">prev</span>
                </li>

                <li th:each="pageNum : ${#numbers.sequence(1, documents.totalPages)}"
                    th:classappend="${pageNum == currentPage} ? 'active'">
                    <a th:text="${pageNum}"
                       th:href="@{/documents(page=${pageNum}, search=${param.search}, fileType=${param.fileType}, storage=${param.storage})}">
                    </a>
                </li>

                <li th:classappend="${documents.last} ? 'disabled'">
                    <a th:if="${!documents.last}"
                       th:href="@{/documents(page=${currentPage + 1}, search=${param.search}, fileType=${param.fileType}, storage=${param.storage})}">
                        next
                    </a>
                    <span th:if="${documents.last}">next</span>
                </li>
            </ul>
        </div>

    </div>
</div>

<div id="upload" class="modal-custom">
    <div class="modal-custom-content">
        <div class="modal-custom-header">
            <h4 class="modal-custom-title">Upload Document</h4>
            <a class="modal-custom-close" href="#">
                <i class="fa-solid fa-xmark"></i>
            </a>
        </div>
        <form th:action="@{/documents/upload}" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label class="form-label">File</label>
                <div class="file-input-wrapper">
                    <label for="fileInput" class="file-input-label">
                        <span id="fileName">Click to select a file</span>
                    </label>
                    <input type="file"
                           id="fileInput"
                           name="file"
                           class="file-input"
                           required
                           onchange="updateFileName(this)">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Description (optional)</label>
                <textarea name="description"
                          class="form-control"
                          rows="4"
                          placeholder="Enter a description for this document..."></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="icon-btn p-custom-md">
                    Upload
                </button>
                <a class="icon-btn p-custom-md" href="#">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    function viewDocument(card) {
        const docId = card.getAttribute('data-id');
        window.location.href = '/documents/' + docId;
    }

    function updateFileName(input) {
        const fileName = input.files[0]?.name || 'Click to select a file';
        document.getElementById('fileName').textContent = fileName;
    }

    function filterDocuments() {
        const searchValue = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.querySelectorAll('.doc-card');

        cards.forEach(card => {
            const name = card.getAttribute('data-name')?.toLowerCase() || '';
            if (name.includes(searchValue)) {
                card.style.display = '';
            } else {
                card.style.display = 'none';
            }
        });
    }
</script>

<div th:replace="~{fragments/scripts :: footer_scripts}"></div>
</body>
</html>
