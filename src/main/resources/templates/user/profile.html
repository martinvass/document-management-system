<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="hu">
<head th:replace="~{fragments/header :: html_header(title='My Profile', additionalLinks=~{this::page_links})}">
    <th:block th:fragment="page_links">
        <link rel="stylesheet" th:href="@{/css/components.css}">
        <link rel="stylesheet" th:href="@{/css/dashboard.css}">
        <link rel="stylesheet" th:href="@{/css/home.css}">
    </th:block>
</head>
<body>
<nav th:replace="~{fragments/dashboard/navigation :: navigation_bar}"></nav>
<div th:replace="~{fragments/dashboard/sidebar :: sidebar(content=~{::content})}">
    <div th:fragment="content" class="container-fluid py-4">
        <a th:href="@{/home}" class="btn btn-outline-secondary mb-4">
            <i class="fas fa-arrow-left me-1"></i> Back to Home
        </a>

        <div class="mb-4">
            <h3 class="fw-bold mb-0">
                My Profile
            </h3>
            <small class="text-muted">Information about your profile</small>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-header section-header-gradient" style="margin-bottom: 0 !important;">
                        <h5 class="mb-0 text-white">
                            Personal Information
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted small fw-semibold">First Name</label>
                                <p class="mb-0 fs-5" th:text="${user.profile.firstName}"></p>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small fw-semibold">Last Name</label>
                                <p class="mb-0 fs-5" th:text="${user.profile.lastName}"></p>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small fw-semibold">Email</label>
                                <p class="mb-0 fs-5">
                                    <span th:text="${user.profile.email}"></span>
                                </p>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small fw-semibold">Username</label>
                                <p class="mb-0 fs-5">
                                    <span th:text="${user.username}"></span>
                                </p>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small fw-semibold">Member Since</label>
                                <p class="mb-0 fs-5">
                                    <span th:text="${#dates.format(user.creationDate, 'MMMM dd, yyyy')}"></span>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm mb-4" th:if="${activeProfile != null}">
                    <div class="card-header section-header-gradient" style="margin-bottom: 0 !important;">
                        <h5 class="mb-0 text-white">
                            Current Workspace
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="d-flex align-items-center gap-3">
                            <div class="icon-box-gradient">
                                <span class="fs-2 fw-bold text-white"
                                      th:text="${#strings.substring(activeProfile.corporation.name, 0, 1)}"></span>
                            </div>
                            <div class="flex-grow-1">
                                <h5 class="mb-1" th:text="${activeProfile.corporation.name}"></h5>
                                <p class="mb-0">
                                    <span class="badge"
                                          th:classappend="${activeProfile.role.name() == 'ADMIN' ? 'bg-danger' : 'bg-success'}"
                                          th:text="${activeProfile.role}"></span>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-header section-header-gradient" style="margin-bottom: 0 !important;">
                        <h5 class="mb-0 text-white">
                            Stats
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3 pb-3 border-bottom">
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="text-muted">
                                    <i class="fas fa-building me-2"></i>Companies
                                </span>
                                <span class="badge bg-primary fs-6" th:text="${#lists.size(allProfiles)}"></span>
                            </div>
                        </div>
                        <div class="mb-3 pb-3 border-bottom">
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="text-muted">
                                    <i class="fas fa-shield-halved me-2"></i>Admin Roles
                                </span>
                                <span class="badge bg-danger fs-6" th:text="${adminCount}"></span>
                            </div>
                        </div>
                        <div>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="text-muted">
                                    <i class="fas fa-user me-2"></i>Employee Roles
                                </span>
                                <span class="badge bg-success fs-6" th:text="${employeeCount}"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header section-header-gradient" style="margin-bottom: 0 !important;">
                        <h5 class="mb-0 text-white">
                            All Companies
                        </h5>
                    </div>
                    <div class="card-body p-2">
                        <div th:each="profile : ${allProfiles}"
                             class="p-2 border-bottom"
                             th:classappend="${profile.id == activeProfile?.id ? 'bg-accent' : ''}">
                            <div class="d-flex align-items-center gap-2">
                                <div class="icon-box-sm">
                                    <span class="fw-bold text-white"
                                          th:text="${#strings.substring(profile.corporation.name, 0, 1)}"></span>
                                </div>
                                <div class="flex-grow-1 min-w-0">
                                    <div class="small fw-semibold text-truncate" th:text="${profile.corporation.name}"></div>
                                    <div class="small text-muted" th:text="${profile.role}"></div>
                                </div>
                                <span th:if="${profile.id == activeProfile?.id}"
                                      class="badge bg-success">Active</span>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/scripts :: footer_scripts}"></div>
</body>
</html>
