<div th:fragment="corpJoinModal(joinDto)" class="modal-custom" id="join"
     aria-labelledby="joinCorpModalLabel" aria-hidden="true">
    <div class="modal-custom-content">
        <div class="modal-custom-header">
            <h5 class="modal-custom-title fw-bold" id="joinCorpModalLabel">Join Corporation</h5>
            <a class="modal-custom-close" href="#">
                <i class="fa-solid fa-xmark"></i>
            </a>
        </div>

        <form th:action="@{/corporation/join}" th:object="${joinDto}" method="post" enctype="multipart/form-data"
              class="needs-validation" novalidate>
            <div class="mb-3">
                <label for="name" class="form-label fw-bold">Invitation Code</label>
                <input type="text"
                       th:field="*{code}"
                       id="name"
                       class="form-control corporation-input"
                       required>
                <div class="invalid-feedback">Please enter an invitation code!</div>
            </div>

            <button type="submit" class="btn submit-btn"><i class="fas fa-paper-plane"></i>&nbsp;Submit</button>
        </form>
    </div>
</div>
