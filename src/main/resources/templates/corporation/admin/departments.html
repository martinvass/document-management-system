<!DOCTYPE html>
<html lang="hu" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: html_header(title='DMS - Departments', additionalLinks=~{this::page_links})}">
    <th:block th:fragment="page_links">
        <link rel="stylesheet" th:href="@{/css/dashboard.css}">
        <link rel="stylesheet" th:href="@{/css/components.css}">
        <link rel="stylesheet" th:href="@{/css/home.css}">
    </th:block>
</head>
<body>

<nav th:replace="~{fragments/dashboard/navigation :: navigation_bar}"></nav>

<div th:if="${success}" th:replace="~{fragments/toasts-messages :: alert_success(message=${success})}"></div>
<div th:if="${error}"   th:replace="~{fragments/toasts-messages :: alert_error(message=${error})}"></div>

<div th:replace="~{fragments/dashboard/sidebar :: sidebar(content=~{::content})}">
    <div th:fragment="content">
        <div class="container-fluid py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="fw-bold mb-0">Departments</h3>
                    <small class="text-muted">
                        Manage departments in <span th:text="${activeProfile.corporation.name}">Corporation</span>
                    </small>
                </div>
                <a class="btn btn-primary shadow-sm" href="#create">
                    <i class="fas fa-plus me-1"></i> New Department
                </a>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="card shadow-sm">
                        <div class="card-body text-center">
                            <h6 class="text-muted mb-1">Total Departments</h6>
                            <h2 class="fw-bold text-primary mb-0" th:text="${departments.totalElements}">0</h2>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="search-wrapper ms-auto">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search departments..." id="searchInput" onkeyup="filterDepartments()"/>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                        <tr>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Members</th>
                            <th>Created</th>
                            <th>Created By</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody id="departmentsTableBody">
                        <tr th:each="dept : ${departments}"
                            th:attr="data-name=${dept.name}, data-desc=${dept.description}">
                            <td>
                                <strong th:text="${dept.name}">IT Department</strong>
                            </td>
                            <td th:text="${dept.description ?: '—'}">Department description</td>
                            <td>
                                <span class="badge bg-info"
                                      th:text="${dept.memberCount ?: 0} + ' members'">0 members</span>
                            </td>
                            <td th:text="${#temporals.format(dept.createdAt, 'yyyy-MM-dd')}">2025-01-15</td>
                            <td th:text="${dept.createdBy?.profile?.username ?: '—'}">admin</td>
                            <td>
                                <div class="d-flex gap-1">
                                    <a class="btn btn-sm btn-outline-secondary"
                                       th:href="'#edit' + ${dept.id}">
                                        <i class="fas fa-edit"></i> Edit
                                    </a>
                                    <form th:action="@{/corporation/admin/departments/{id}/archive(id=${dept.id})}"
                                          method="post" class="d-inline">
                                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                                onclick="return confirm('Archive this department?')">
                                            <i class="fas fa-archive"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(departments)}">
                            <td colspan="6" class="text-center text-muted py-4">No departments found.</td>
                        </tr>
                        </tbody>
                    </table>

                    <div class="floating-pagination-modern">
                        <ul class="pagination-modern">
                            <li th:classappend="${departments.first} ? 'disabled'">
                                <a th:if="${!departments.first}"
                                   th:href="@{/corporation/admin/departments(page=${currentPage - 1})}">
                                    prev
                                </a>
                                <span th:if="${departments.first}">prev</span>
                            </li>

                            <li th:each="pageNum : ${#numbers.sequence(1, departments.totalPages)}"
                                th:classappend="${pageNum == currentPage} ? 'active'">
                                <a th:text="${pageNum}"
                                   th:href="@{/corporation/admin/departments(page=${pageNum})}">
                                </a>
                            </li>

                            <li th:classappend="${departments.last} ? 'disabled'">
                                <a th:if="${!departments.last}"
                                   th:href="@{/corporation/admin/departments(page=${currentPage + 1})}">
                                    next
                                </a>
                                <span th:if="${departments.last}">next</span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal-custom" id="create">
    <div class="modal-custom-content">
        <div class="modal-custom-header">
            <h5 class="modal-custom-title fw-bold">Create New Department</h5>
            <a class="modal-custom-close" href="#">
                <i class="fa-solid fa-xmark"></i>
            </a>
        </div>
        <form th:action="@{/corporation/admin/departments/create}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Name</label>
                <input type="text" name="name" class="form-control" placeholder="e.g., IT Department" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Description (optional)</label>
                <textarea name="description" class="form-control" rows="3"
                          placeholder="Brief description of the department..."></textarea>
            </div>
            <a class="btn btn-outline-secondary" href="#">Cancel</a>
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-plus me-1"></i> Create
            </button>
        </form>
    </div>
</div>

<div th:each="dept : ${departments}"
     class="modal-custom"
     th:id="'edit' + ${dept.id}">
    <div class="modal-custom-content">
        <div class="modal-custom-header">
            <h5 class="modal-custom-title">Edit Department</h5>
            <a class="modal-custom-close" href="#">
                <i class="fa-solid fa-xmark"></i>
            </a>
        </div>
        <form method="post" th:action="@{'/corporation/admin/departments/' + ${dept.id} + '/update'}">
            <div class="mb-3">
                <label class="form-label fw-semibold">Department Name</label>
                <input type="text" class="form-control" name="name" th:value="${dept.name}" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Description</label>
                <textarea class="form-control" name="description" rows="3" th:text="${dept.description}"></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">Update Department</button>
        </form>
    </div>
</div>

<script>
    function filterDepartments() {
        const searchValue = document.getElementById('searchInput').value.toLowerCase();
        const rows = document.querySelectorAll('#departmentsTableBody tr[data-name]');

        rows.forEach(row => {
            const name = row.getAttribute('data-name')?.toLowerCase() || '';
            const desc = row.getAttribute('data-desc')?.toLowerCase() || '';

            if (name.includes(searchValue) || desc.includes(searchValue)) {
                row.style.display = '';
            } else {
                row.style.display = 'none';
            }
        });
    }
</script>

<div th:replace="~{fragments/scripts :: footer_scripts}"></div>

</body>
</html>
