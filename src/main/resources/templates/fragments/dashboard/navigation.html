<nav th:fragment="navigation_bar" class="navbar navbar-expand navbar-custom">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/home}">
            DMS
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#profileDropdown">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="profileDropdown">
            <ul class="navbar-nav">
                <li class="nav-item dropdown me-2">
                    <a class="nav-link dropdown-toggle navbar-user-badge" href="#" id="activeProfileDropdown" role="button" data-bs-toggle="dropdown">
                        <i class="fas fa-building me-2"></i>
                        <span th:text="${activeProfile?.corporation?.name ?: 'No profile selected'}"></span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="activeProfileDropdown">
                        <li class="dropdown-header text-muted px-3">Select your profile:</li>

                        <li th:each="p : ${profiles}">
                            <form th:action="@{/profile/switch}" method="post" th:object="${p}">
                                <input type="hidden" name="profileId" th:value="${p.id}"/>
                                <button type="submit" class="dropdown-item"
                                        th:classappend="${p.id} == ${activeProfileId} ? 'fw-bold text-success'">
                                    <span th:text="${p.corporation?.name ?: 'No corporation'}"></span>
                                    <small class="text-muted ms-1" th:text="'[' + ${p.role} + ']'"></small>
                                    <span th:if="${p.id} == ${activeProfileId}" class="badge bg-success ms-2">Active</span>
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>

                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle navbar-user-badge" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                        <div class="navbar-user-icon">
                            <i class="fas fa-user"></i>
                        </div>
                        <span th:text="${#authentication.name}">User</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a th:href="@{/profile/view}" class="dropdown-item">
                            <i class="fas fa-id-card me-2"></i> View Profile
                        </a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="fas fa-sign-out-alt me-2"></i> Log Out
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>

            </ul>
        </div>
    </div>
</nav>
