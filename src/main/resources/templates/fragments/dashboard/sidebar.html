<div class="container-fluid" th:fragment="sidebar(content)">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-3 col-lg-2 d-md-block custom-sidebar sidebar collapse">
            <div class="position-sticky pt-3">
                <div class="px-3 pb-2">
                    <div class="d-flex align-items-center mb-3" th:if="${activeProfile}">
                        <div>
                            <h6 class="mb-0 fw-bold text-white" th:text="${activeProfile.corporation.name}">Corporation</h6>
                            <small class="text-white-50">Document Management</small>
                        </div>
                    </div>

                    <div th:if="${activeProfile == null}">
                        <a href="#"
                           data-bs-toggle="modal"
                           data-bs-target="#corpCreateModal"
                           class="sidebar-btn sidebar-btn-primary">
                            <i class="fas fa-plus me-2"></i>
                            <span>Create Company</span>
                        </a>

                        <a href="#"
                           data-bs-toggle="modal"
                           data-bs-target="#corpJoinModal"
                           class="sidebar-btn sidebar-btn-primary">
                            <i class="fas fa-arrow-right-to-bracket me-2"></i>
                            <span>Join Company</span>
                        </a>
                    </div>
                </div>

                <div class="px-3 pb-3" th:if="${activeProfile}">
                    <div class="mb-2" style="background: rgba(255,255,255,0.1); border-radius: 8px; padding: 12px;">
                        <div class="d-flex align-items-center">
                            <div style="width: 40px; height: 40px; border-radius: 50%; background: #5F6F52; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; color: white; margin-right: 12px;">
                                <span th:text="${#strings.substring(activeProfile.user.profile.firstName, 0, 1) + #strings.substring(activeProfile.user.profile.lastName, 0, 1)}"></span>
                            </div>
                            <div style="flex: 1; min-width: 0;">
                                <div style="font-weight: 600; color: white; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"
                                     th:text="${activeProfile.user.profile.firstName + ' ' + activeProfile.user.profile.lastName}">
                                </div>
                                <div style="font-size: 11px; color: rgba(255,255,255,0.6); text-transform: uppercase;"
                                     th:text="${activeProfile.role}"></div>
                            </div>
                        </div>
                    </div>

                    <form th:action="@{/corporation/sign-out}" method="get">
                        <button type="submit" class="btn btn-sm w-100 sidebar-logout-btn" style="background: transparent; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.8); padding: 8px; border-radius: 6px; font-size: 13px; font-weight: 500; transition: all 0.2s;">
                            <i class="fa-solid fa-right-from-bracket me-1"></i> Sign Out
                        </button>
                    </form>
                </div>

                <div class="px-3" th:if="${activeProfile}">
                    <hr class="border-secondary my-2">
                    <p class="text-white text-uppercase small fw-bold mb-2">Corporation</p>
                    <ul class="nav flex-column">
                        <li class="nav-item mb-1">
                            <a th:href="@{/home}" class="nav-link text-white d-flex align-items-center">
                                <i class="fas fa-house me-2"></i>Home
                            </a>
                        </li>
                        <li class="nav-item mb-1">
                            <a th:href="@{/documents}" class="nav-link text-white d-flex align-items-center">
                                <i class="fas fa-file-alt me-2"></i>Documents
                            </a>
                        </li>
                        <li class="nav-item mb-1">
                            <a th:href="@{/corporation/members}" class="nav-link text-white d-flex align-items-center">
                                <i class="fas fa-users me-2"></i>Team Members
                            </a>
                        </li>
                    </ul>

                    <div th:if="${activeProfile.isCorporationAdmin()}">
                        <hr class="border-secondary my-2">
                        <p class="text-white text-uppercase small fw-bold mb-2">Admin</p>
                        <ul class="nav flex-column">
                            <li class="nav-item mb-1">
                                <a th:href="@{/corporation/admin/departments}"
                                   class="nav-link text-white d-flex align-items-center">
                                    <i class="fas fa-building me-2"></i>Departments
                                </a>
                            </li>
                            <li class="nav-item mb-1">
                                <a th:href="@{/corporation/admin/invitations}"
                                   class="nav-link text-white d-flex align-items-center">
                                    <i class="fas fa-envelope-open-text me-2"></i>Invitations
                                </a>
                            </li>
                            <li class="nav-item mb-1">
                                <a th:href="@{/corporation/admin/settings}"
                                   class="nav-link text-white d-flex align-items-center">
                                    <i class="fas fa-cogs me-2"></i>Settings
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>

        <div class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4 content-area">
            <div th:insert="${content}"></div>
        </div>
    </div>

    <style>
        .sidebar-logout-btn:hover {
            background: rgba(220, 53, 69, 0.15) !important;
            border-color: rgba(220, 53, 69, 0.4) !important;
            color: #ff6b6b !important;
        }

        .sidebar-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 20px;
            margin-bottom: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .sidebar-btn-primary {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
        }

        .sidebar-btn-primary:hover {
            background-color: #E9E3C4;
            transition: all 0.3s ease;
            color: white;
        }

        .sidebar-btn i {
            font-size: 16px;
        }
    </style>
</div>
